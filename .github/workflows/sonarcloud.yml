name: SonarQube
on:
    push:
        branches:
            - main
    pull_request:
        types: [opened, synchronize, reopened]
permissions:
    contents: read
jobs:
    build:
        name: Build and analyze
        runs-on: ubuntu-latest
        steps:
            - name: Set up JDK 17
              uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
              with:
                  java-version: 17
                  distribution: 'zulu'
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 10.0.x
            - name: Cache SonarQube Cloud packages
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: ~/.sonar/cache
                  key: ${{ runner.os }}-sonar
                  restore-keys: ${{ runner.os }}-sonar
            - name: Cache SonarQube Cloud scanner
              id: cache-sonar-scanner
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: ~/.sonar/scanner
                  key: ${{ runner.os }}-sonar-scanner
                  restore-keys: ${{ runner.os }}-sonar-scanner
            - name: Install SonarQube Cloud scanner
              if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
              run: |
                  mkdir -p ~/.sonar/scanner
                  dotnet tool update dotnet-sonarscanner --tool-path ~/.sonar/scanner
            - name: Install dotnet-coverage
              run: dotnet tool install --global dotnet-coverage
            - name: Install LibMan CLI
              run: dotnet tool install -g Microsoft.Web.LibraryManager.Cli
            - name: Restore LibMan packages (Admin)
              working-directory: src/MadWorldEU.Byakko.Controller.Admin
              run: libman restore
            - name: Restore LibMan packages (Portal)
              working-directory: src/MadWorldEU.Byakko.Controller.Portal
              run: libman restore
            - name: Build and analyze
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              run: |
                  ~/.sonar/scanner/dotnet-sonarscanner begin \
                    /k:"MadWorldEU_Byakko" \
                    /o:"madworldeu" \
                    /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
                    /d:sonar.cs.vscoveragexml.reportsPaths="coverage.xml"
                  dotnet restore Byakko.slnx -p:LibraryManagerDisabled=true
                  dotnet build Byakko.slnx --no-restore -p:LibraryManagerDisabled=true
                  dotnet-coverage collect "dotnet test Byakko.slnx --no-build" -f xml -o coverage.xml
                  ~/.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"