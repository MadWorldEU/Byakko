name: Build & Push Docker Main

on:
    push:
        branches:
            - main
        tags:
            - 'v*'

permissions:
    packages: write

jobs:
    docker-build-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Set up QEMU for ARM64 builds
              uses: docker/setup-qemu-action@v3
              with:
                  platforms: arm64

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ secrets.GHCR_USERNAME }}
                  password: ${{ secrets.GHCR_TOKEN }}

            - name: Resolve image tag
              id: tag
              run: |
                  if [[ "${{ github.ref_type }}" == "tag" ]]; then
                    echo "image_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
                  else
                    echo "image_tag=latest" >> $GITHUB_OUTPUT
                  fi
                  echo "Using image tag: ${{ steps.tag.outputs.image_tag }}"

            - name: Build & push API
              run: docker buildx build --platform linux/amd64,linux/arm64 -f src/MadWorldEU.Byakko.Controller.Api/Dockerfile --tag ghcr.io/madworldeu/byakko-api:${{ steps.tag.outputs.image_tag }} --push .

            - name: Build & push Portal
              run: docker buildx build --platform linux/amd64,linux/arm64 -f src/MadWorldEU.Byakko.Controller.Portal/Dockerfile --tag ghcr.io/madworldeu/byakko-portal:${{ steps.tag.outputs.image_tag }} --push .

            - name: Build & push Admin
              run: docker buildx build --platform linux/amd64,linux/arm64 -f src/MadWorldEU.Byakko.Controller.Admin/Dockerfile --tag ghcr.io/madworldeu/byakko-admin:${{ steps.tag.outputs.image_tag }} --push .