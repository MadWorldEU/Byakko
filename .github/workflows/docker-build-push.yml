name: Build & Push Docker Main

on:
    push:
        branches:
            - main

permissions:
    packages: write

jobs:
    docker-build-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Set up QEMU for ARM64 builds
              uses: docker/setup-qemu-action@v3
              with:
                  platforms: arm64

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ secrets.GHCR_USERNAME }}
                  password: ${{ secrets.GHCR_TOKEN }}

            - name: Build & push API
              run: docker buildx build --platform linux/amd64,linux/arm64 -f src/MadWorldEU.Byakko.Controller.Api/Dockerfile --tag ghcr.io/madworldeu/byakko-api:latest --push .

            - name: Build & push Portal
              run: docker buildx build --platform linux/amd64,linux/arm64 -f src/MadWorldEU.Byakko.Controller.Portal/Dockerfile --tag ghcr.io/madworldeu/byakko-portal:latest --push .

            - name: Build & push Admin
              run: docker buildx build --platform linux/amd64,linux/arm64 -f src/MadWorldEU.Byakko.Controller.Admin/Dockerfile --tag ghcr.io/madworldeu/byakko-admin:latest --push .