name: Deploy production
on:
    push:
        tags:
            - 'v*'
    pull_request:
        types: [opened, synchronize, reopened]
        

permissions:
    contents: read

jobs:
    dry-run:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Helm
              uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 #v5

            - name: Dry run
              run: |
                  helm template byakko deployments/helm/byakko \
                    --values deployments/helm/byakko/Values.yaml \
                    --values deployments/helm/byakko/Values.Production.yaml \
                    --set appVersion="dry-run" \
                    --set clusterIssuer.email="dry-run@example.com" \
                    --set securityTxt.contact="mailto:dry-run@example.com" \
                    --set postgres.password="dry-run" \
                    --set keycloak.adminPassword="dry-run" \
                    --set keycloak.postgres.password="dry-run" \
                    --set pgadmin.password="dry-run" \
                    --set pgadmin.keycloakClientSecret="dry-run" \
                    --set observability.grafana.adminPassword="dry-run" \
                    --set observability.grafana.keycloakClientSecret="dry-run" \
                    --set storage.ovhCloud.endpoint="https://dry-run.example.com" \
                    --set storage.ovhCloud.accessKey="dry-run" \
                    --set storage.ovhCloud.secretKey="dry-run" \
                    --set storage.ovhCloud.region="dry-run" \
                    --set api.encryption.key="dry-run" \
                    --set mail.host="dry-run" \
                    --set mail.username="dry-run" \
                    --set mail.token="dry-run" \
                    --set mail.administratorFrom.address="dry-run@example.com" \
                    --set mail.administratorTo.address="dry-run@example.com" > /dev/null

    deployment:
        if: github.event_name == 'push'
        runs-on: ubuntu-latest
        environment: vps-production
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Helm
              uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 #v5

            - name: Write kubeconfig
              env:
                  KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
              run: |
                  mkdir -p ~/.kube
                  echo "$KUBECONFIG_CONTENT" | base64 -d  > ~/.kube/config
                  chmod 600 ~/.kube/config

            - name: Deploy
              env:
                  IMAGE_TAG: ${{ github.ref_name }}
                  CLUSTER_ISSUER_EMAIL: ${{ secrets.CLUSTER_ISSUER_EMAIL }}
                  SECURITY_TXT_CONTACT: ${{ secrets.SECURITY_TXT_CONTACT }}
                  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
                  KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
                  KEYCLOAK_POSTGRES_PASSWORD: ${{ secrets.KEYCLOAK_POSTGRES_PASSWORD }}
                  PGADMIN_PASSWORD: ${{ secrets.PGADMIN_PASSWORD }}
                  PGADMIN_KEYCLOAK_CLIENT_SECRET: ${{ secrets.PGADMIN_KEYCLOAK_CLIENT_SECRET }}
                  GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
                  GRAFANA_KEYCLOAK_CLIENT_SECRET: ${{ secrets.GRAFANA_KEYCLOAK_CLIENT_SECRET }}
                  OVHCLOUD_ENDPOINT: ${{ secrets.OVHCLOUD_ENDPOINT }}
                  OVHCLOUD_ACCESS_KEY: ${{ secrets.OVHCLOUD_ACCESS_KEY }}
                  OVHCLOUD_SECRET_KEY: ${{ secrets.OVHCLOUD_SECRET_KEY }}
                  OVHCLOUD_REGION: ${{ secrets.OVHCLOUD_REGION }}
                  ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
                  MAIL_HOST: ${{ secrets.MAIL_HOST }}
                  MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
                  MAIL_TOKEN: ${{ secrets.MAIL_TOKEN }}
                  MAIL_ADMINISTRATOR_FROM_ADDRESS: ${{ secrets.MAIL_ADMINISTRATOR_FROM_ADDRESS }}
                  MAIL_ADMINISTRATOR_TO_ADDRESS: ${{ secrets.MAIL_ADMINISTRATOR_TO_ADDRESS }}
              run: |
                  helm upgrade --install byakko deployments/helm/byakko \
                    --values deployments/helm/byakko/Values.yaml \
                    --values deployments/helm/byakko/Values.Production.yaml \
                    --set appVersion="$IMAGE_TAG" \
                    --set clusterIssuer.email="$CLUSTER_ISSUER_EMAIL" \
                    --set securityTxt.contact="$SECURITY_TXT_CONTACT" \
                    --set postgres.password="$POSTGRES_PASSWORD" \
                    --set keycloak.adminPassword="$KEYCLOAK_ADMIN_PASSWORD" \
                    --set keycloak.postgres.password="$KEYCLOAK_POSTGRES_PASSWORD" \
                    --set pgadmin.password="$PGADMIN_PASSWORD" \
                    --set pgadmin.keycloakClientSecret="$PGADMIN_KEYCLOAK_CLIENT_SECRET" \
                    --set observability.grafana.adminPassword="$GRAFANA_ADMIN_PASSWORD" \
                    --set observability.grafana.keycloakClientSecret="$GRAFANA_KEYCLOAK_CLIENT_SECRET" \
                    --set storage.ovhCloud.endpoint="$OVHCLOUD_ENDPOINT" \
                    --set storage.ovhCloud.accessKey="$OVHCLOUD_ACCESS_KEY" \
                    --set storage.ovhCloud.secretKey="$OVHCLOUD_SECRET_KEY" \
                    --set storage.ovhCloud.region="$OVHCLOUD_REGION" \
                    --set api.encryption.key="$ENCRYPTION_KEY" \
                    --set mail.host="$MAIL_HOST" \
                    --set mail.username="$MAIL_USERNAME" \
                    --set mail.token="$MAIL_TOKEN" \
                    --set mail.administratorFrom.address="$MAIL_ADMINISTRATOR_FROM_ADDRESS" \
                    --set mail.administratorTo.address="$MAIL_ADMINISTRATOR_TO_ADDRESS" \
                    --wait \
                    --timeout 5m