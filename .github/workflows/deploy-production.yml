name: Deploy production
on:
    push:
        tags:
            - 'v*'
    pull_request:
        branches:
            - main

permissions:
    contents: read

jobs:
    dry-run:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Helm
              uses: azure/setup-helm@v4

            - name: Dry run
              run: |
                  helm template byakko deployments/helm/byakko \
                    --values deployments/helm/byakko/Values.yaml \
                    --values deployments/helm/byakko/Values.Production.yaml \
                    --set api.tag="dry-run" \
                    --set admin.image.tag="dry-run" \
                    --set portal.image.tag="dry-run" \
                    --set clusterIssuer.email="dry-run@example.com" \
                    --set postgres.password="dry-run" \
                    --set keycloak.adminPassword="dry-run" \
                    --set keycloak.postgres.password="dry-run" \
                    --set pgadmin.password="dry-run" \
                    --set observability.grafana.adminPassword="dry-run" \
                    --set api.storage.ovhCloud.endpoint="https://dry-run.example.com" \
                    --set api.storage.ovhCloud.accessKey="dry-run" \
                    --set api.storage.ovhCloud.secretKey="dry-run" \
                    --set api.storage.ovhCloud.region="dry-run" > /dev/null

    deployment:
        if: github.event_name == 'push'
        runs-on: ubuntu-latest
        environment: vps-production
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Helm
              uses: azure/setup-helm@v4

            - name: Write kubeconfig
              run: |
                  mkdir -p ~/.kube
                  echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
                  chmod 600 ~/.kube/config

            - name: Deploy
              run: |
                  helm upgrade --install byakko deployments/helm/byakko \
                    --values deployments/helm/byakko/Values.yaml \
                    --values deployments/helm/byakko/Values.Production.yaml \
                    --set api.tag="${{ github.ref_name }}" \
                    --set admin.image.tag="${{ github.ref_name }}" \
                    --set portal.image.tag="${{ github.ref_name }}" \
                    --set clusterIssuer.email="${{ secrets.CLUSTER_ISSUER_EMAIL }}" \
                    --set postgres.password="${{ secrets.POSTGRES_PASSWORD }}" \
                    --set keycloak.adminPassword="${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}" \
                    --set keycloak.postgres.password="${{ secrets.KEYCLOAK_POSTGRES_PASSWORD }}" \
                    --set pgadmin.password="${{ secrets.PGADMIN_PASSWORD }}" \
                    --set observability.grafana.adminPassword="${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
                    --set api.storage.ovhCloud.endpoint="${{ secrets.OVHCLOUD_ENDPOINT }}" \
                    --set api.storage.ovhCloud.accessKey="${{ secrets.OVHCLOUD_ACCESS_KEY }}" \
                    --set api.storage.ovhCloud.secretKey="${{ secrets.OVHCLOUD_SECRET_KEY }}" \
                    --set api.storage.ovhCloud.region="${{ secrets.OVHCLOUD_REGION }}" \
                    --wait \
                    --timeout 5m