server {
    listen 8080;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://localhost:7286 https://localhost:4322; font-src 'self'; frame-ancestors 'none';" always;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}