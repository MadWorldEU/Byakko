apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
    name: api-transport
    namespace: {{ .Values.namespace }}
spec:
    forwardingTimeouts:
        responseHeaderTimeout: {{ .Values.api.ingress.responseHeaderTimeout }}
        dialTimeout: 30s
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
    name: security-headers
    namespace: {{ .Values.namespace }}
spec:
    headers:
        contentTypeNosniff: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
            Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"
            Permissions-Policy: "accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), cross-origin-isolated=(), display-capture=(), document-domain=(), encrypted-media=(), execution-while-not-rendered=(), execution-while-out-of-viewport=(), fullscreen=(), geolocation=(), gyroscope=(), keyboard-map=(), magnetometer=(), microphone=(), midi=(), navigation-override=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=()"
            Content-Security-Policy: "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; connect-src 'self' https://api.{{ .Values.ingress.domain }} https://authentication.{{ .Values.ingress.domain }}; frame-src 'self' https://authentication.{{ .Values.ingress.domain }}; upgrade-insecure-requests;"
            Cross-Origin-Embedder-Policy: "require-corp"
            Cross-Origin-Opener-Policy: "same-origin"
            Cross-Origin-Resource-Policy: "same-site"