{{- if .Values.observability.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
    name: {{ .Values.observability.tempo.name }}-config
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.observability.tempo.name }}
data:
    tempo.yaml: |
        server:
          http_listen_port: 3200
        distributor:
          receivers:
            otlp:
              protocols:
                http:
                  endpoint: 0.0.0.0:4318
        storage:
          trace:
            backend: local
            local:
              path: /var/tempo/traces
            wal:
              path: /var/tempo/wal
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
    name: {{ .Values.observability.tempo.name }}
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.observability.tempo.name }}
spec:
    serviceName: {{ .Values.observability.tempo.name }}
    replicas: 1
    selector:
        matchLabels:
            app: {{ .Values.observability.tempo.name }}
    template:
        metadata:
            labels:
                app: {{ .Values.observability.tempo.name }}
        spec:
            automountServiceAccountToken: false
            containers:
                - name: {{ .Values.observability.tempo.name }}
                  image: "{{ .Values.observability.tempo.image }}:{{ .Values.observability.tempo.tag }}"
                  args:
                      - -config.file=/etc/tempo/tempo.yaml
                  ports:
                      - containerPort: 3200
                        name: http
                      - containerPort: {{ .Values.observability.tempo.containerPort }}
                        name: otlp-http
                  resources:
                      requests:
                          cpu: {{ .Values.observability.tempo.resources.requests.cpu }}
                          memory: {{ .Values.observability.tempo.resources.requests.memory }}
                          ephemeral-storage: {{ index .Values.observability.tempo.resources.requests "ephemeral-storage" }}
                      limits:
                          cpu: {{ .Values.observability.tempo.resources.limits.cpu }}
                          memory: {{ .Values.observability.tempo.resources.limits.memory }}
                          ephemeral-storage: {{ index .Values.observability.tempo.resources.limits "ephemeral-storage" }}
                  livenessProbe:
                      httpGet:
                          path: /ready
                          port: 3200
                      initialDelaySeconds: 60
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /ready
                          port: 3200
                      initialDelaySeconds: 30
                      periodSeconds: 10
                  volumeMounts:
                      - name: config
                        mountPath: /etc/tempo
                      - name: tempo-data
                        mountPath: /var/tempo
            volumes:
                - name: config
                  configMap:
                      name: {{ .Values.observability.tempo.name }}-config
    volumeClaimTemplates:
        - metadata:
              name: tempo-data
          spec:
              accessModes:
                  - ReadWriteOnce
              resources:
                  requests:
                      storage: {{ .Values.observability.tempo.storageSize }}
---
apiVersion: v1
kind: Service
metadata:
    name: {{ .Values.observability.tempo.name }}
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.observability.tempo.name }}
spec:
    selector:
        app: {{ .Values.observability.tempo.name }}
    ports:
        - port: 3200
          targetPort: 3200
          protocol: TCP
          name: http
        - port: {{ .Values.observability.tempo.containerPort }}
          targetPort: {{ .Values.observability.tempo.containerPort }}
          protocol: TCP
          name: otlp-http
{{- end }}