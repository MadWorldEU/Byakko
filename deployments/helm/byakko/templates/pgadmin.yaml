apiVersion: v1
kind: Secret
metadata:
    name: {{ .Values.pgadmin.name }}
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.pgadmin.name }}
type: Opaque
stringData:
    PGADMIN_DEFAULT_EMAIL: {{ .Values.pgadmin.email }}
    PGADMIN_DEFAULT_PASSWORD: {{ .Values.pgadmin.password }}
    PGADMIN_KEYCLOAK_CLIENT_SECRET: {{ .Values.pgadmin.keycloakClientSecret }}
---
apiVersion: v1
kind: ConfigMap
metadata:
    name: {{ .Values.pgadmin.name }}-oauth
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.pgadmin.name }}
data:
    config_local.py: |
        import os

        AUTHENTICATION_SOURCES = ['oauth2']
        OAUTH2_AUTO_CREATE_USER = True

        OAUTH2_CONFIG = [
            {
                'OAUTH2_NAME': 'Keycloak',
                'OAUTH2_DISPLAY_NAME': 'Sign in with Keycloak',
                'OAUTH2_CLIENT_ID': 'pgadmin-client',
                'OAUTH2_CLIENT_SECRET': os.environ.get('PGADMIN_KEYCLOAK_CLIENT_SECRET', ''),
                'OAUTH2_SERVER_METADATA_URL': 'https://authentication.{{ .Values.ingress.domain }}/realms/MadWorld/.well-known/openid-configuration',
                'OAUTH2_TOKEN_URL': 'https://authentication.{{ .Values.ingress.domain }}/realms/MadWorld/protocol/openid-connect/token',
                'OAUTH2_AUTHORIZATION_URL': 'https://authentication.{{ .Values.ingress.domain }}/realms/MadWorld/protocol/openid-connect/auth',
                'OAUTH2_USERINFO_ENDPOINT': 'https://authentication.{{ .Values.ingress.domain }}realms/MadWorld/protocol/openid-connect/userinfo',
                'OAUTH2_API_BASE_URL': 'https://authentication.{{ .Values.ingress.domain }}/realms/MadWorld/protocol/openid-connect/',
                'OAUTH2_SCOPE': 'openid email profile',
                'OAUTH2_USERNAME_CLAIM': 'email',
                'OAUTH2_ICON': '',
                'OAUTH2_BUTTON_COLOR': '#fd9000',
                'OAUTH2_SSL_CERT_VERIFICATION': True
            }
        ]
---
apiVersion: v1
kind: ConfigMap
metadata:
    name: {{ .Values.pgadmin.name }}-servers
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.pgadmin.name }}
data:
    servers.json: |
        {
          "Servers": {
            "1": {
              "Name": "Byakko PostgreSQL",
              "Group": "Servers",
              "Host": "{{ .Values.postgres.name }}",
              "Port": {{ .Values.postgres.containerPort }},
              "MaintenanceDB": "{{ .Values.postgres.database }}",
              "Username": "{{ .Values.postgres.username }}",
              "SSLMode": "prefer",
              "Shared": true
            },
            "2": {
              "Name": "Authentication PostgreSQL",
              "Group": "Servers",
              "Host": "{{ .Values.keycloak.postgres.name }}",
              "Port": {{ .Values.keycloak.postgres.containerPort }},
              "MaintenanceDB": "{{ .Values.keycloak.postgres.database }}",
              "Username": "{{ .Values.keycloak.postgres.username }}",
              "SSLMode": "prefer",
              "Shared": true
            }
          }
        }
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: {{ .Values.pgadmin.name }}
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.pgadmin.name }}
spec:
    replicas: 1
    selector:
        matchLabels:
            app: {{ .Values.pgadmin.name }}
    template:
        metadata:
            labels:
                app: {{ .Values.pgadmin.name }}
        spec:
            automountServiceAccountToken: false
            containers:
                - name: {{ .Values.pgadmin.name }}
                  image: "{{ .Values.pgadmin.image }}:{{ .Values.pgadmin.tag }}"
                  ports:
                      - containerPort: {{ .Values.pgadmin.containerPort }}
                  resources:
                      requests:
                          cpu: {{ .Values.pgadmin.resources.requests.cpu }}
                          memory: {{ .Values.pgadmin.resources.requests.memory }}
                          ephemeral-storage: {{ index .Values.pgadmin.resources.requests "ephemeral-storage" }}
                      limits:
                          cpu: {{ .Values.pgadmin.resources.limits.cpu }}
                          memory: {{ .Values.pgadmin.resources.limits.memory }}
                          ephemeral-storage: {{ index .Values.pgadmin.resources.limits "ephemeral-storage" }}
                  envFrom:
                      - secretRef:
                            name: {{ .Values.pgadmin.name }}
                  env:
                      - name: PGADMIN_CONFIG_SERVER_MODE
                        value: "True"
                      - name: PGADMIN_SERVER_JSON_FILE
                        value: /pgadmin4/servers.json
                  volumeMounts:
                      - name: servers-config
                        mountPath: /pgadmin4/servers.json
                        subPath: servers.json
                        readOnly: true
                      - name: oauth-config
                        mountPath: /pgadmin4/config_local.py
                        subPath: config_local.py
                        readOnly: true
                  livenessProbe:
                      httpGet:
                          path: /misc/ping
                          port: {{ .Values.pgadmin.containerPort }}
                      initialDelaySeconds: 120
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /misc/ping
                          port: {{ .Values.pgadmin.containerPort }}
                      initialDelaySeconds: 60
                      periodSeconds: 10
            volumes:
                - name: servers-config
                  configMap:
                      name: {{ .Values.pgadmin.name }}-servers
                - name: oauth-config
                  configMap:
                      name: {{ .Values.pgadmin.name }}-oauth
---
apiVersion: v1
kind: Service
metadata:
    name: {{ .Values.pgadmin.name }}
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.pgadmin.name }}
spec:
    selector:
        app: {{ .Values.pgadmin.name }}
    ports:
        - port: {{ .Values.pgadmin.servicePort }}
          targetPort: {{ .Values.pgadmin.containerPort }}
          protocol: TCP