apiVersion: v1
kind: ConfigMap
metadata:
    name: {{ .Values.admin.name }}-config
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.admin.name }}
data:
    appsettings.json: |
        {
          "ApiBaseUrl": "https://api.{{ .Values.ingress.domain }}",
          "Oidc": {
            "Authority": "https://authentication.{{ .Values.ingress.domain }}/realms/{{ .Values.keycloak.realm }}",
            "ClientId": "{{ .Values.admin.oidc.clientId }}",
            "ResponseType": "code",
            "DefaultScopes": [
              "openid",
              "profile",
              "email",
              "offline_access"
            ]
          }
        }
    security.txt: |
        Contact: {{ .Values.securityTxt.contact }}
        Expires: {{ .Values.securityTxt.expires }}
        Preferred-Languages: {{ .Values.securityTxt.preferredLanguages }}
        Canonical: https://admin.{{ .Values.ingress.domain }}/.well-known/security.txt
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: {{ .Values.admin.name }}
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.admin.name }}
spec:
    replicas: {{ .Values.admin.replicas }}
    selector:
        matchLabels:
            app: {{ .Values.admin.name }}
    template:
        metadata:
            labels:
                app: {{ .Values.admin.name }}
        spec:
            automountServiceAccountToken: false
            containers:
                - name: {{ .Values.admin.name }}
                  image: "{{ .Values.admin.image.repository }}:{{ .Values.appVersion }}"
                  imagePullPolicy: {{ .Values.imagePullPolicy }}
                  ports:
                      - containerPort: {{ .Values.admin.port }}
                  resources:
                      requests:
                          cpu: {{ .Values.admin.resources.requests.cpu }}
                          memory: {{ .Values.admin.resources.requests.memory }}
                          ephemeral-storage: {{ index .Values.admin.resources.requests "ephemeral-storage" }}
                      limits:
                          cpu: {{ .Values.admin.resources.limits.cpu }}
                          memory: {{ .Values.admin.resources.limits.memory }}
                          ephemeral-storage: {{ index .Values.admin.resources.limits "ephemeral-storage" }}
                  volumeMounts:
                      - name: appsettings
                        mountPath: /usr/share/nginx/html/appsettings.json
                        subPath: appsettings.json
                        readOnly: true
                      - name: appsettings
                        mountPath: /usr/share/nginx/html/.well-known/security.txt
                        subPath: security.txt
                        readOnly: true
                  livenessProbe:
                      httpGet:
                          path: /health.txt
                          port: {{ .Values.admin.port }}
                      initialDelaySeconds: 5
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /health.txt
                          port: {{ .Values.admin.port }}
                      initialDelaySeconds: 5
                      periodSeconds: 10
            volumes:
                - name: appsettings
                  configMap:
                      name: {{ .Values.admin.name }}-config
---
apiVersion: v1
kind: Service
metadata:
    name: {{ .Values.admin.name }}
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.admin.name }}
spec:
    selector:
        app: {{ .Values.admin.name }}
    ports:
        - port: {{ .Values.admin.port }}
          targetPort: {{ .Values.admin.port }}
          protocol: TCP