{{- if .Values.observability.enabled }}
apiVersion: v1
kind: Secret
metadata:
    name: {{ .Values.observability.grafana.name }}
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.observability.grafana.name }}
type: Opaque
stringData:
    GF_SECURITY_ADMIN_USER: {{ .Values.observability.grafana.adminUser }}
    GF_SECURITY_ADMIN_PASSWORD: {{ .Values.observability.grafana.adminPassword }}
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: {{ .Values.observability.grafana.keycloakClientSecret }}
---
apiVersion: v1
kind: ConfigMap
metadata:
    name: {{ .Values.observability.grafana.name }}-datasources
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.observability.grafana.name }}
data:
    datasources.yaml: |
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            access: proxy
            url: http://{{ .Values.observability.prometheus.name }}:{{ .Values.observability.prometheus.containerPort }}
            isDefault: true
          - name: Tempo
            type: tempo
            access: proxy
            url: http://{{ .Values.observability.tempo.name }}:3200
          - name: Loki
            type: loki
            access: proxy
            url: http://{{ .Values.observability.loki.name }}:{{ .Values.observability.loki.containerPort }}
---
apiVersion: v1
kind: ConfigMap
metadata:
    name: {{ .Values.observability.grafana.name }}-dashboard-provisioning
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.observability.grafana.name }}
data:
    dashboards.yaml: |
        apiVersion: 1
        providers:
          - name: default
            type: file
            disableDeletion: false
            updateIntervalSeconds: 30
            options:
              path: /var/lib/grafana/dashboards
              foldersFromFilesStructure: false
---
apiVersion: v1
kind: ConfigMap
metadata:
    name: {{ .Values.observability.grafana.name }}-dashboards
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.observability.grafana.name }}
data:
    {{- range $path, $bytes := .Files.Glob "grafana/dashboards/*.json" }}
    {{ base $path }}: |-
        {{ $.Files.Get $path | nindent 8 }}
    {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: {{ .Values.observability.grafana.name }}
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.observability.grafana.name }}
spec:
    replicas: 1
    selector:
        matchLabels:
            app: {{ .Values.observability.grafana.name }}
    template:
        metadata:
            annotations:
                rollme: "{{ now | unixEpoch }}"
            labels:
                app: {{ .Values.observability.grafana.name }}
        spec:
            automountServiceAccountToken: false
            containers:
                - name: {{ .Values.observability.grafana.name }}
                  image: "{{ .Values.observability.grafana.image }}:{{ .Values.observability.grafana.tag }}"
                  ports:
                      - containerPort: {{ .Values.observability.grafana.containerPort }}
                        name: http
                  resources:
                      requests:
                          cpu: {{ .Values.observability.grafana.resources.requests.cpu }}
                          memory: {{ .Values.observability.grafana.resources.requests.memory }}
                          ephemeral-storage: {{ index .Values.observability.grafana.resources.requests "ephemeral-storage" }}
                      limits:
                          cpu: {{ .Values.observability.grafana.resources.limits.cpu }}
                          memory: {{ .Values.observability.grafana.resources.limits.memory }}
                          ephemeral-storage: {{ index .Values.observability.grafana.resources.limits "ephemeral-storage" }}
                  envFrom:
                      - secretRef:
                            name: {{ .Values.observability.grafana.name }}
                  env:
                      - name: GF_SERVER_ROOT_URL
                        value: "https://grafana.{{ .Values.ingress.domain }}"
                      - name: GF_AUTH_GENERIC_OAUTH_ENABLED
                        value: "true"
                      - name: GF_AUTH_GENERIC_OAUTH_NAME
                        value: "Keycloak"
                      - name: GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP
                        value: "true"
                      - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
                        value: "grafana-client"
                      - name: GF_AUTH_GENERIC_OAUTH_SCOPES
                        value: "openid email profile roles"
                      - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
                        value: "https://authentication.{{ .Values.ingress.domain }}/realms/MadWorld/protocol/openid-connect/auth"
                      - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
                        value: "https://authentication.{{ .Values.ingress.domain }}/realms/MadWorld/protocol/openid-connect/token"
                      - name: GF_AUTH_GENERIC_OAUTH_API_URL
                        value: "http://authentication.{{ .Values.ingress.domain }}/realms/MadWorld/protocol/openid-connect/userinfo"
                      - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
                        value: "contains(roles, 'Administrator') && 'Admin' || ''"
                      - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT
                        value: "true"
                  livenessProbe:
                      httpGet:
                          path: /api/health
                          port: {{ .Values.observability.grafana.containerPort }}
                      initialDelaySeconds: 15
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /api/health
                          port: {{ .Values.observability.grafana.containerPort }}
                      initialDelaySeconds: 10
                      periodSeconds: 10
                  volumeMounts:
                      - name: datasources
                        mountPath: /etc/grafana/provisioning/datasources
                      - name: dashboard-provisioning
                        mountPath: /etc/grafana/provisioning/dashboards
                      - name: dashboards
                        mountPath: /var/lib/grafana/dashboards
            volumes:
                - name: datasources
                  configMap:
                      name: {{ .Values.observability.grafana.name }}-datasources
                - name: dashboard-provisioning
                  configMap:
                      name: {{ .Values.observability.grafana.name }}-dashboard-provisioning
                - name: dashboards
                  configMap:
                      name: {{ .Values.observability.grafana.name }}-dashboards
---
apiVersion: v1
kind: Service
metadata:
    name: {{ .Values.observability.grafana.name }}
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.observability.grafana.name }}
spec:
    selector:
        app: {{ .Values.observability.grafana.name }}
    ports:
        - port: {{ .Values.observability.grafana.servicePort }}
          targetPort: {{ .Values.observability.grafana.containerPort }}
          protocol: TCP
{{- end }}