apiVersion: apps/v1
kind: Deployment
metadata:
    name: {{ .Values.api.name }}
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.api.name }}
spec:
    replicas: 1
    selector:
        matchLabels:
            app: {{ .Values.api.name }}
    template:
        metadata:
            labels:
                app: {{ .Values.api.name }}
        spec:
            automountServiceAccountToken: false
            containers:
                - name: {{ .Values.api.name }}
                  image: "{{ .Values.api.image }}:{{ .Values.api.tag }}"
                  ports:
                      - containerPort: {{ .Values.api.containerPort }}
                  resources:
                      requests:
                          cpu: {{ .Values.api.resources.requests.cpu }}
                          memory: {{ .Values.api.resources.requests.memory }}
                          ephemeral-storage: {{ index .Values.api.resources.requests "ephemeral-storage" }}
                      limits:
                          cpu: {{ .Values.api.resources.limits.cpu }}
                          memory: {{ .Values.api.resources.limits.memory }}
                          ephemeral-storage: {{ index .Values.api.resources.limits "ephemeral-storage" }}
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: {{ .Values.api.containerPort }}
                      initialDelaySeconds: 10
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: {{ .Values.api.containerPort }}
                      initialDelaySeconds: 5
                      periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
    name: {{ .Values.api.name }}
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.api.name }}
spec:
    selector:
        app: {{ .Values.api.name }}
    ports:
        - port: {{ .Values.api.servicePort }}
          targetPort: {{ .Values.api.containerPort }}
          protocol: TCP