apiVersion: v1
kind: ConfigMap
metadata:
    name: {{ .Values.api.name }}-security-config
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.api.name }}
data:
    security.txt: |
        Contact: {{ .Values.securityTxt.contact }}
        Expires: {{ .Values.securityTxt.expires }}
        Preferred-Languages: {{ .Values.securityTxt.preferredLanguages }}
        Canonical: https://api.{{ .Values.ingress.domain }}/.well-known/security.txt
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: {{ .Values.api.name }}
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.api.name }}
spec:
    replicas: 1
    selector:
        matchLabels:
            app: {{ .Values.api.name }}
    template:
        metadata:
            labels:
                app: {{ .Values.api.name }}
        spec:
            automountServiceAccountToken: false
            containers:
                - name: {{ .Values.api.name }}
                  image: "{{ .Values.api.image }}:{{ .Values.api.tag }}"
                  imagePullPolicy: {{ .Values.imagePullPolicy }}
                  ports:
                      - containerPort: {{ .Values.api.containerPort }}
                  resources:
                      requests:
                          cpu: {{ .Values.api.resources.requests.cpu }}
                          memory: {{ .Values.api.resources.requests.memory }}
                          ephemeral-storage: {{ index .Values.api.resources.requests "ephemeral-storage" }}
                      limits:
                          cpu: {{ .Values.api.resources.limits.cpu }}
                          memory: {{ .Values.api.resources.limits.memory }}
                          ephemeral-storage: {{ index .Values.api.resources.limits "ephemeral-storage" }}
                  env:
                      - name: ConnectionStrings__byakko-db
                        value: "Host={{ .Values.postgres.name }};Port={{ .Values.postgres.containerPort }};Username={{ .Values.postgres.username }};Password={{ .Values.postgres.password }};Database={{ .Values.postgres.database }}"
                        
                      - name: ConnectionStrings__localstack
                        value: "http://{{ .Values.localstack.name }}.{{ .Values.namespace }}:{{ .Values.localstack.servicePort }}"
                      - name: OTEL_EXPORTER_OTLP_ENDPOINT
                        {{- if .Values.observability.enabled }}
                        value: "http://{{ .Values.observability.otelCollector.name }}:4317"
                        {{- else }}
                        value: {{ .Values.api.observability.otlpEndpoint | quote }}
                        {{- end }}
                      - name: Authentication__Authority
                        value: "https://authentication.{{ .Values.ingress.domain }}/realms/{{ .Values.keycloak.realm }}"
                      - name: Authentication__Audience
                        value: {{ .Values.keycloak.audience | quote }}
                      - name: Authentication__ValidateUser
                        value: "true"
                      - name: Database__AutoMigrate
                        value: {{ .Values.api.database.autoMigrate | quote }}
                      - name: Storage__Mode
                        value: {{ .Values.api.storage.mode | quote }}
                      - name: Storage__BucketName
                        value: {{ .Values.api.storage.bucketName | quote }}
                      - name: Storage__OvhCloud__Endpoint
                        value: {{ .Values.api.storage.ovhCloud.endpoint | quote }}
                      - name: Storage__OvhCloud__AccessKey
                        value: {{ .Values.api.storage.ovhCloud.accessKey | quote }}
                      - name: Storage__OvhCloud__SecretKey
                        value: {{ .Values.api.storage.ovhCloud.secretKey | quote }}
                      - name: Storage__OvhCloud__Region
                        value: {{ .Values.api.storage.ovhCloud.region | quote }}
                      - name: Encryption__Key
                        value: {{ .Values.api.encryption.key | quote }}
                      - name: OpenApi__ServerUrl
                        value: "https://api.{{ .Values.ingress.domain }}"
                      - name: Cors__AllowedOrigins__0
                        value: "https://api.{{ .Values.ingress.domain }}"
                      - name: Cors__AllowedOrigins__1
                        value: "https://{{ .Values.ingress.domain }}"
                      - name: Cors__AllowedOrigins__2
                        value: "https://www.{{ .Values.ingress.domain }}"
                      - name: Cors__AllowedOrigins__3
                        value: "https://fileshare.{{ .Values.ingress.domain }}"
                      - name: Cors__AllowedOrigins__4
                        value: "https://admin.{{ .Values.ingress.domain }}"
                  volumeMounts:
                      - name: security-txt
                        mountPath: /app/wwwroot/.well-known/security.txt
                        subPath: security.txt
                        readOnly: true
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: {{ .Values.api.containerPort }}
                      initialDelaySeconds: 10
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: {{ .Values.api.containerPort }}
                      initialDelaySeconds: 5
                      periodSeconds: 10
            volumes:
                - name: security-txt
                  configMap:
                      name: {{ .Values.api.name }}-security-config
---
apiVersion: v1
kind: Service
metadata:
    name: {{ .Values.api.name }}
    namespace: {{ .Values.namespace }}
    labels:
        app: {{ .Values.api.name }}
spec:
    selector:
        app: {{ .Values.api.name }}
    ports:
        - port: {{ .Values.api.servicePort }}
          targetPort: {{ .Values.api.containerPort }}
          protocol: TCP