namespace: "byakko"

admin:
    name: "admin"
    replicas: 1
    port: 8080
    image:
        repository: "ghcr.io/madworldeu/byakko-admin"
        tag: "v0.3.0"
    resources:
        requests:
            cpu: "100m"
            memory: "128Mi"
            ephemeral-storage: "128Mi"
        limits:
            cpu: "250m"
            memory: "256Mi"
            ephemeral-storage: "256Mi"

portal:
    name: "portal"
    replicas: 1
    port: 8080
    image:
        repository: "ghcr.io/madworldeu/byakko-portal"
        tag: "v0.3.0"
    resources:
        requests:
            cpu: "100m"
            memory: "128Mi"
            ephemeral-storage: "128Mi"
        limits:
            cpu: "250m"
            memory: "256Mi"
            ephemeral-storage: "256Mi"