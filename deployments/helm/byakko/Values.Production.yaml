namespace: "byakko-production"
imagePullPolicy: "IfNotPresent"
    
ingress:
    domain: "mad-world.eu"
    
clusterIssuer:
    enabled: true
    email: "changeme"

localstack:
    enabled: false

postgres:
    password: "changeme"

keycloak:
    adminPassword: "changeme"
    postgres:
        password: "changeme"

pgadmin:
    password: "changeme"

observability:
    enabled: true
    prometheus:
        storageSize: 50Gi
    tempo:
        storageSize: 20Gi
    loki:
        storageSize: 20Gi
    grafana:
        adminPassword: "changeme"

api:
    storage:
        mode: "OvhCloud"
        ovhCloud:
            endpoint: "changeme"
            accessKey: "changeme"
            secretKey: "changeme"
            region: "changeme"